kind = "mobile"
previewPath = "/"
title = "Our Hearts"
version = "1.0.0"
id = "artifacts/our-hearts"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20470

[services.development]
run = "pnpm --filter @workspace/our-hearts run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/our-hearts", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/our-hearts", "run", "serve" ]

[services.env]
PORT = "20470"
BASE_PATH = "/"
